name: docker-image

on:
  # 自动推送运行（已注释，取消注释即可启用）
  # push:
  #   branches:
  #     - 'main'
  #   tags:
  #     - 'v*'

  # 手动运行
  workflow_dispatch:
    inputs:
      push_image:
        description: '是否推送镜像到 DockerHub'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

  # PR 检查
  pull_request:
    branches:
      - 'text'

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: ./docker_code
            file: ./docker_code/Dockerfile
            tag: code
          - context: ./docker_txttg
            file: ./docker_txttg/Dockerfile
            tag: txt
          - context: ./docker_115
            file: ./docker_115/Dockerfile
            tag: 115
          - context: ./docker_mpt
            file: ./docker_mpt/Dockerfile
            tag: mpt
          - context: ./docker_top
            file: ./docker_top/Dockerfile
            tag: top
          - context: ./docker_tunnel
            file: ./docker_tunnel/Dockerfile
            tag: tunnel
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: aiastia/mytgbot
      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.push_image == 'true' || github.event_name == 'push' }}
          tags: aiastia/mytgbot:${{ matrix.tag }}
