name: 清理 Actions 历史记录

on:
  workflow_dispatch:
    inputs:
      days_old:
        description: '删除多少天前的运行记录'
        required: true
        default: '30'
        type: string
      keep_min_runs:
        description: '每个工作流最少保留的运行数'
        required: true
        default: '3'
        type: string
      clean_caches:
        description: '是否同时清理 Caches'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      dry_run:
        description: '试运行（不实际删除）'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

  schedule:
    - cron: '0 3 * * *'

jobs:
  # 清理 Workflow 运行记录
  cleanup-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: 清理旧的 Workflow 运行记录
        uses: actions/github-script@v7
        with:
          script: |
            const days_old = parseInt('${{ github.event.inputs.days_old || '30' }}');
            const keep_min_runs = parseInt('${{ github.event.inputs.keep_min_runs || '3' }}');
            const dry_run = '${{ github.event.inputs.dry_run || 'false' }}' === 'true';
            const cutoff = new Date(Date.now() - days_old * 24 * 60 * 60 * 1000);

            console.log(`📅 删除 ${days_old} 天前的运行记录 (${cutoff.toISOString().split('T')[0]})`);
            console.log(`📦 每个工作流最少保留 ${keep_min_runs} 条`);
            console.log(`🔍 试运行: ${dry_run}`);

            const workflows = await github.rest.actions.listRepoWorkflows({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            let totalDeleted = 0;
            let totalKept = 0;

            // 当前运行 ID，避免删除正在执行的本条记录
            const currentRunId = context.runId;

            for (const wf of workflows.data.workflows) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: wf.id,
                per_page: 100,
                status: 'completed'
              });

              if (runs.data.total_count === 0) continue;

              const sorted = runs.data.workflow_runs.sort((a, b) =>
                new Date(b.created_at) - new Date(a.created_at)
              );

              let deleted = 0;
              for (let i = 0; i < sorted.length; i++) {
                if (i < keep_min_runs) { totalKept++; continue; }
                const run = sorted[i];
                // 跳过当前正在运行的本条记录，防止自毁
                if (run.id === currentRunId) { totalKept++; continue; }
                if (new Date(run.created_at) < cutoff) {
                  if (dry_run) {
                    console.log(`  [试运行] 将删除: ${run.name} #${run.run_number} (${run.created_at})`);
                  } else {
                    try {
                      await github.rest.actions.deleteWorkflowRun({
                        owner: context.repo.owner, repo: context.repo.repo, run_id: run.id
                      });
                    } catch (err) {
                      console.log(`  ❌ 删除失败: #${run.run_number}: ${err.message}`);
                      continue;
                    }
                  }
                  deleted++; totalDeleted++;
                }
              }
              if (deleted > 0) console.log(`🗑️ ${wf.name}: ${dry_run ? '将删除' : '已删除'} ${deleted} 条`);
            }

            console.log(`\n===== 运行记录清理结果 =====`);
            console.log(`🗑️ ${dry_run ? '将删除' : '已删除'}: ${totalDeleted} 条`);
            console.log(`📁 保留: ${totalKept} 条`);

  # 清理 Caches
  cleanup-caches:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    if: github.event.inputs.clean_caches == 'true' || github.event_name == 'schedule'

    steps:
      - name: 清理旧的 Caches
        uses: actions/github-script@v7
        with:
          script: |
            const dry_run = '${{ github.event.inputs.dry_run || 'false' }}' === 'true';
            console.log(`🔍 清理 Caches，试运行: ${dry_run}`);

            let caches;
            try {
              caches = await github.rest.actions.getActionsCacheList({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              });
            } catch (err) {
              console.log(`⚠️ 获取缓存列表失败: ${err.message}`);
              return;
            }

            if (!caches.data || !caches.data.actions_caches || caches.data.actions_caches.length === 0) {
              console.log('📭 没有缓存需要清理');
              return;
            }

            let deleted = 0;
            for (const cache of caches.data.actions_caches) {
              if (dry_run) {
                console.log(`  [试运行] 将删除缓存: ${cache.key} (id=${cache.id}, size=${Math.round(cache.size_in_bytes / 1024)}KB)`);
              } else {
                try {
                  await github.rest.actions.deleteActionsCacheById({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    cache_id: cache.id
                  });
                  console.log(`  ✅ 已删除: ${cache.key}`);
                } catch (err) {
                  console.log(`  ❌ 删除失败: ${cache.key}: ${err.message}`);
                  continue;
                }
              }
              deleted++;
            }

            console.log(`\n===== Caches 清理结果 =====`);
            console.log(`🗑️ ${dry_run ? '将删除' : '已删除'}: ${deleted} 个缓存`);
            console.log(`📦 总缓存数: ${caches.data.actions_caches.length}`);